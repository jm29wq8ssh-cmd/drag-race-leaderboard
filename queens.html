<table id="queenTable">

<tr>
<th>Rank</th>
<th>Queen</th>
<th>Country</th>
<th>PPE</th>
</tr>

</table>

<script src="data.js"></script>

<script>

queens.sort((a,b)=> b.ppe - a.ppe)

const table = document.getElementById("queenTable")

queens.forEach((q,index)=>{

let row = table.insertRow()

row.innerHTML = `
<td>${index+1}</td>
<td>${q.name}</td>
<td>${q.country}</td>
<td>${q.ppe}</td>
`

})

</script>
